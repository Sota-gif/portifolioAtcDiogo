<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: #9470c7;
        }
        .container{
            width: 400px;
            margin: 40px auto;
            background: #c5afe7;
            padding: 20px;
            border-radius: 10px;
        }
        h2{
            text-align: center;
        }
        label{
            display: block;
            margin-top: 10px;
        }
        input, select{
            width: 150px;
            padding: 8px;
            margin-top: 8px;
        }
        .radio-grupo{
            margin-top: 5px;
        }
        button{
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            background-color: #b99ddf;
            color: rgb(6, 55, 99);
            border: none;
            cursor: pointer;
        }
        #resultado{
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            background-color: rgb(208, 221, 233);
        }
        .erro{
            color: rgb(156, 3, 3);
        }
        .sucesso{
            color: rgb(13, 126, 3);
        }

    </style>
</head>
<body>
    <div class="container">
        <h2>Atendimento</h2>
        <form id="formulario">
            <label>Nome: </label>
            <input type="text" id="nome" placeholder="Digite Seu Nome"> <br><br> 
            
            <label>Idade: </label>
            <input type="number" id="idade" placeholder="Digite Sua Idade"> <br><br>

            <label>Tipo De Atendimento: </label>
                <select id="tipo">
                    <option value="">Selecione:</option>
                    <option value="Técnico">Técnico</option>
                    <option value="Administrativo">Administrativo</option>
                    <option value="Suporte">Suporte</option>
                </select> <br><br>
            
            <label>Prioridade: </label>
            <div class="radio-grupo">
                <input type="radio" name="prioridade"> Baixa<br>
                <input type="radio" name="prioridade"> Media<br>
                <input type="radio" name="prioridade"> Alta<br>
            </div>
                <br><br>
            <button type="submit">Enviar</button>
        </form>

        <div id="resultado"></div>
    </div>

           
    <script>
            document.getElementById("formulario").addEventListener("submit", function(event){
                event.preventDefault();

                let nome = document.getElementById("nome").value;
                let idade = document.getElementById("idade").value;
                let tipo = document.getElementById("tipo").value;

                let prioridadeSelecionada = document.querySelector('input[name="prioridade"]:checked');
                let prioridade = prioridadeSelecionada ? prioridadeSelecionada.value : "";

                let resultado = document.getElementById("resultado")

                if(nome === ""){
                resultado.innerHTML = "<p class='erro'> O Nome É Obrigatorio</p>"
                return;}else{
                resultado.innerHTML = "<p class='sucesso'> Sucesso</p>"
                }

                if(idade === "" || idade < 0){
                resultado.innerHTML = "<p class='erro'> A Idade é Invalida</p>"
                return;}

                let mensagem = ""

                if(prioridade === "Alta"){
                mensagem += "Atendimento Urgente.<br>"
                }

               if(tipo === "Tecnico"){
                mensagem += "Encaminhar Para O Tecnico.<br>"
                }

                if(idade < 18){
                mensagem += "Necessário Responsável.<br>"
            }   

            resultado.innerHTML =`
            <p class="sucesso"> <strong>Resumo Do Atendimento:</strong></p>
            nome: ${nome}<br>
            idade: ${idade}<br>
            tipo: ${tipo}<br>
            prioridade: ${prioridade}<br>`
            });
    </script>
</body>
</html>
